  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  @media(max-width:380px){.habit-row{grid-template-columns:1fr repeat(7,26px)}.habits-day-headers{grid-template-columns:1fr repeat(7,26px)}.habit-check{width:26px;height:26px}}
</style>

<script>
const CK='sb_config';
function gC(){try{return JSON.parse(localStorage.getItem(CK))||{}}catch(e){return{}}}
function sC(c){localStorage.setItem(CK,JSON.stringify(c))}
let ss='offline',lst=null,st=null;
function lL(k,f){try{const d=localStorage.getItem('sb_'+k);return d?JSON.parse(d):f}catch(e){return f}}
function sL(k,d){try{localStorage.setItem('sb_'+k,JSON.stringify(d))}catch(e){}}
function gAD(){return{captures,habits,memos,morningChecks,morningDate:lL('morning_date',''),phoneMinutes,weekEvents,appointments,habitNames:hL}}
function aD(d){if(!d)return;captures=d.captures||[];habits=d.habits||{};memos=d.memos||{partner:'',work:''};morningChecks=d.morningChecks||{};if(d.morningDate)sL('morning_date',d.morningDate);phoneMinutes=d.phoneMinutes||{today:0,date:''};if(d.weekEvents)weekEvents=d.weekEvents;if(d.appointments)appointments=d.appointments;if(d.habitNames)hL=d.habitNames;sL('captures',captures);sL('habits',habits);sL('memos',memos);sL('morning',morningChecks);sL('phone',phoneMinutes);sL('weekEvents',weekEvents);sL('appointments',appointments);sL('habitNames',hL)}
async function cL(){const c=gC();if(!c.binId||!c.apiKey){ss='offline';return null}ss='syncing';render();try{const r=await fetch('https://api.jsonbin.io/v3/b/'+c.binId+'/latest',{headers:{'X-Master-Key':c.apiKey}});if(!r.ok)throw new Error(r.status);const j=await r.json();ss='ok';lst=new Date();return j.record||null}catch(e){ss='error';return null}}
async function cS(){const c=gC();if(!c.binId||!c.apiKey){ss='offline';return}ss='syncing';render();try{const r=await fetch('https://api.jsonbin.io/v3/b/'+c.binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':c.apiKey},body:JSON.stringify(gAD())});if(!r.ok)throw new Error(r.status);ss='ok';lst=new Date()}catch(e){ss='error'}render()}
function schS(){sL('captures',captures);sL('habits',habits);sL('memos',memos);sL('morning',morningChecks);sL('phone',phoneMinutes);sL('weekEvents',weekEvents);sL('appointments',appointments);sL('habitNames',hL);if(st)clearTimeout(st);st=setTimeout(()=>cS(),1500)}

let captures=lL('captures',[]),habits=lL('habits',{}),memos=lL('memos',{partner:'',work:''}),morningChecks=lL('morning',{}),phoneMinutes=lL('phone',{today:0,date:''}),appointments=lL('appointments',[]),currentTab='capture',editingDay=null;
const today=new Date(),dN=['So','Mo','Di','Mi','Do','Fr','Sa'],dNF=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'],tS=today.toISOString().split('T')[0],cD=today.getDay();
const lm=lL('morning_date','');if(lm!==tS){morningChecks={};sL('morning',morningChecks);sL('morning_date',tS)}
if(phoneMinutes.date!==tS){phoneMinutes={today:0,date:tS};sL('phone',phoneMinutes)}

const dW={Mo:[{text:'Arbeit 7:40\u201317:00',type:'work'},{text:'Tochter & Hunde',type:'family'},{text:'Freundin trainiert (Abend)',type:'free'},{text:'\u2192 Mini-Training 20 Min',type:'sport'}],Di:[{text:'Arbeit 7:40\u201316:00',type:'work'},{text:'Freundin arbeitet NM',type:'family'},{text:'Kinderturnen 17\u201318',type:'family'},{text:'\u2192 Gitarre 20 Min',type:'free'}],Mi:[{text:'Arbeit 7:40\u201317:00',type:'work'},{text:'Tochter & Hunde',type:'family'},{text:'Freundin trainiert (Abend)',type:'free'},{text:'\u2192 Kettlebell/Seil 20 Min',type:'sport'}],Do:[{text:'Arbeit 7:40\u201316:00',type:'work'},{text:'Tennis 16\u201318',type:'sport'}],Fr:[{text:'Arbeit 7:40\u201316:00',type:'work'},{text:'Freundin trainiert NM',type:'free'},{text:'Tochter & Hunde',type:'family'},{text:'\u2192 Dehnen & Mobilit\u00e4t 20 Min',type:'sport'}],Sa:[{text:'Schwimmen 6:00',type:'sport'},{text:'Freundin arbeitet VM',type:'free'},{text:'Papa-Tochter-Zeit',type:'family'},{text:'\u2192 Gitarre 20 Min',type:'free'}],So:[{text:'Familientag',type:'family'},{text:'\u2192 Woche planen 15 Min',type:'work'},{text:'\u2192 Dehnen & Mobilit\u00e4t',type:'sport'}]};

function rCapture(el){
  var tc=captures.filter(function(c){return c.date===tS}),ol=captures.filter(function(c){return c.date!==tS}).slice(0,20);
  el.innerHTML='<div class="card"><div class="card-title">BRAIN DUMP</div><div class="section-desc"><strong>Das Herzst\u00fcck.</strong> Alles was dir durch den Kopf geht \u2192 sofort hier rein. Gedanke \u2192 Eintippen \u2192 Kopf frei.</div><div class="capture-area"><input type="text" id="captureInput" placeholder="Gedanke, Aufgabe, Info..." onkeypress="if(event.key===\'Enter\')addCapture()"><select id="captureTag"><option value="arbeit">Arbeit</option><option value="privat">Privat</option><option value="gesundheit">Gesundh.</option><option value="idee">Idee</option></select></div><button class="btn-primary" style="width:100%;margin-bottom:14px" onclick="addCapture()">Erfassen</button>'+(tc.length?'<div class="card-title">HEUTE</div>'+tc.map(function(c){return cHtml(c,captures.indexOf(c))}).join(''):'<div class="empty-state">Kopf leer? Gut. Oder: noch nicht erfasst.</div>')+'</div>'+(ol.length?'<div class="card"><div class="card-title">FR\u00dcHER</div>'+ol.map(function(c){return cHtml(c,captures.indexOf(c))}).join('')+'</div>':'');
  setTimeout(function(){var i=document.getElementById('captureInput');if(i)i.focus()},100);
}
function cHtml(c,i){return'<div class="capture-item"><span class="tag tag-'+c.tag+'">'+c.tag+'</span><span class="text">'+eH(c.text)+'</span><button class="delete-btn" onclick="deleteCapture('+i+')">×</button></div>'}

function rWeek(el){
  var dord=['Mo','Di','Mi','Do','Fr','Sa','So'],d2n={Mo:1,Di:2,Mi:3,Do:4,Fr:5,Sa:6,So:0};
  el.innerHTML='<div class="card"><div class="card-title">WOCHENPLAN</div><div class="section-desc"><strong>Dein fixer Wochenrhythmus.</strong> Tippe auf \u270e um einen Tag zu bearbeiten.</div><div class="week-grid">'+dord.map(function(d){var t=d2n[d]===cD,ev=weekEvents[d]||[];return'<div class="day-row '+(t?'today':'')+'"><div class="day-name">'+d+(t?'<small>HEUTE</small>':'')+'</div><div class="day-events">'+ev.map(function(e){return'<span class="event-chip event-'+e.type+'">'+eH(e.text)+'</span>'}).join('')+'</div><button class="day-edit-btn" onclick="openDayEdit(\''+d+'\')">✎</button></div>'}).join('')+'</div></div>';
}

function rTermine(el){
  var s=appointments.slice().sort(function(a,b){return a.date.localeCompare(b.date)});
  var up=s.filter(function(a){return a.date>=tS}),pa=s.filter(function(a){return a.date<tS}).reverse().slice(0,5);
  el.innerHTML='<div class="card"><div class="card-title">WICHTIGE TERMINE</div><div class="section-desc"><strong>Alles mit festem Datum.</strong> Arzttermine, Deadlines, Geburtstage \u2014 damit nichts untergeht.</div><div class="add-row" style="margin-bottom:14px"><input type="text" id="tText" placeholder="Was?" onkeypress="if(event.key===\'Enter\')addAppt()"><input type="date" id="tDate" value="'+tS+'"><button class="btn-small" onclick="addAppt()">+</button></div>'+(up.length?'<div class="card-title">KOMMEND</div>'+up.map(aHtml).join(''):'<div class="empty-state">Keine Termine</div>')+'</div>'+(pa.length?'<div class="card"><div class="card-title">VERGANGEN</div>'+pa.map(aHtml).join('')+'</div>':'');
}
function aHtml(a){var df=dDf(a.date,tS),cl='';if(df<0)cl='appointment-past';else if(df===0)cl='appointment-today';else if(df<=3)cl='appointment-soon';var lb=df===0?'HEUTE':df===1?'MORGEN':fD(a.date);return'<div class="appointment-item '+cl+'"><span class="appointment-date">'+lb+'</span><span class="appointment-text">'+eH(a.text)+'</span><button class="delete-btn" onclick="delAppt('+appointments.indexOf(a)+')">×</button></div>'}

function rHabits(el){
  var ds=['Mo','Di','Mi','Do','Fr','Sa','So'],ti=cD===0?6:cD-1;
  var td=hL.filter(function(h){return habits[gWK(h.id,ti)]}).length,wd=Object.values(habits).filter(function(v){return v}).length;
  el.innerHTML='<div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center">HABITS<button class="btn-outline" style="padding:4px 10px;font-size:0.68rem" onclick="openHabitEdit()">Anpassen</button></div><div class="section-desc"><strong>Sechs Gewohnheiten, mehr nicht.</strong> Nicht Perfektion \u2014 Sichtbarkeit. 4 von 7 ist ein Sieg. Tippe \u201eAnpassen\u201c um die Gewohnheiten f\u00fcr n\u00e4chste Woche zu \u00e4ndern.</div><div class="habits-grid"><div class="habits-day-headers"><span></span>'+ds.map(function(d){return'<span>'+d+'</span>'}).join('')+'</div>'+hL.map(function(h){return'<div class="habit-row"><span class="habit-name">'+h.name+'</span>'+ds.map(function(d,di){var k=gWK(h.id,di);return'<div class="habit-check '+(habits[k]?'done':'')+'" onclick="toggleHabit(\''+k+'\')">'+(habits[k]?'\u2713':'')+'</div>'}).join('')+'</div>'}).join('')+'</div><div class="streak-bar"><div class="streak-item"><div class="num">'+td+'/'+hL.length+'</div><div class="label">HEUTE</div></div><div class="streak-item"><div class="num">'+wd+'</div><div class="label">WOCHE</div></div><div class="streak-item"><div class="num">'+Math.round(wd/(hL.length*7)*100)+'%</div><div class="label">QUOTE</div></div></div></div>';
}

function openHabitEdit(){
  document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeHabitEdit()"><div class="modal-sheet"><div class="modal-header"><h3>Habits anpassen</h3><button class="modal-close" onclick="closeHabitEdit()">\u00d7</button></div><div class="section-desc" style="margin-bottom:16px"><strong>6 Gewohnheiten \u2014 nicht mehr, nicht weniger.</strong> \u00c4ndere die Namen, die Anzahl bleibt fix.</div><div id="hEditList">'+hL.map(function(h,i){return'<div class="modal-event-row"><span style="color:var(--text-muted);font-size:0.75rem;min-width:20px">'+(i+1)+'.</span><input type="text" value="'+eH(h.name)+'" onchange="updHabit('+i+',this.value)" placeholder="Gewohnheit '+(i+1)+'"></div>'}).join('')+'</div><div class="btn-row"><button class="btn-primary" onclick="closeHabitEdit()">Fertig</button></div></div></div>';
}
function updHabit(i,v){hL[i].name=v;schS()}
function closeHabitEdit(){document.getElementById('modal-root').innerHTML='';render()}

function rRules(el){
  el.innerHTML='<div class="card"><div class="card-title">GEHIRN-REGELN</div><div class="section-desc"><strong>Das Warum hinter dem System.</strong> Lies einmal durch. Komm zur\u00fcck wenn alte Muster auftauchen.</div><div class="focus-quote">\u201eDu bist nicht vergesslich. Du bist \u00fcberlastet.\u201c</div><div class="rules-list">'+bR.map(function(r){return'<div class="rule"><strong>'+r.title+':</strong> '+r.text+'<span class="why">Warum: '+r.why+'</span></div>'}).join('')+'</div></div>';
}

function rMemo(el){
  el.innerHTML='<div class="card"><div class="card-title">WAS FREUNDIN GESAGT HAT</div><div class="section-desc"><strong>Sofort hier rein wenn sie dir was sagt.</strong> \u201eMoment, ich schreib mir das auf weil es mir wichtig ist.\u201c</div><div class="memo-area"><textarea id="pMemo" placeholder="Termine, W\u00fcnsche, Infos...">'+eH(memos.partner)+'</textarea><button class="memo-save" onclick="saveMemo(\'partner\')">Speichern</button></div></div><div class="card"><div class="card-title">ARBEIT \u2014 OFFENE PUNKTE</div><div class="section-desc"><strong>Dein Arbeitspuffer.</strong> Alles was im Kopf kreist \u2192 hier abladen.</div><div class="memo-area"><textarea id="wMemo" placeholder="Offene Mails, Prozesse...">'+eH(memos.work)+'</textarea><button class="memo-save" onclick="saveMemo(\'work\')">Speichern</button></div></div>';
}

function rMorning(el){
  el.innerHTML='<div class="card"><div class="card-title">MORGEN-CHECK</div><div class="section-desc"><strong>5 Minuten vor dem Losfahren.</strong> Setzt sich t\u00e4glich automatisch zur\u00fcck.</div><div class="checklist">'+mI.map(function(it,i){return'<div class="check-item '+(morningChecks[i]?'checked':'')+'" onclick="toggleMorning('+i+')"><div class="checkbox">'+(morningChecks[i]?'\u2713':'')+'</div>'+it+'</div>'}).join('')+'</div></div><div class="card"><div class="card-title">BILDSCHIRMZEIT</div><div class="section-desc"><strong>Doomscroll-Tracker.</strong> Ziel: unter 30 Min.</div><div class="phone-section"><div class="phone-counter '+(phoneMinutes.today>30?(phoneMinutes.today>60?'danger':'warning'):'')+'">'+phoneMinutes.today+' min</div><div class="phone-label">News / Sinnlos-Scroll</div><div class="phone-buttons"><button onclick="addPhoneTime(5)">+5</button><button onclick="addPhoneTime(10)">+10</button><button onclick="addPhoneTime(15)">+15</button><button onclick="resetPhone()">Reset</button></div></div></div>';
}

function rSettings(el){
  var cfg=gC();
  el.innerHTML='<div class="card"><div class="card-title">SYNC</div><div class="section-desc"><strong>Cloud-Sync f\u00fcr alle Ger\u00e4te.</strong></div><div class="settings-field"><label>JSONBin Bin-ID</label><input type="text" id="binId" value="'+eH(cfg.binId||'')+'" placeholder="65a1b2c3..."><div class="hint">jsonbin.io \u2192 Bin \u2192 ID aus URL</div></div><div class="settings-field"><label>API-Key</label><input type="password" id="apiKey" value="'+eH(cfg.apiKey||'')+'" placeholder="$2a$10$..."><div class="hint">jsonbin.io \u2192 API Keys</div></div><div class="btn-row"><button class="btn-primary" onclick="saveSettings()">Verbinden</button><button class="btn-primary" style="background:var(--orange)" onclick="testSync()">Testen</button><button class="btn-primary" style="background:var(--purple)" onclick="forceUpload()">Hochladen</button></div><div id="sStatus"></div></div>';
}

function openDayEdit(d){editingDay=d;rModal()}
function closeModal(){editingDay=null;document.getElementById('modal-root').innerHTML='';render()}
function rModal(){
  if(!editingDay)return;var ev=weekEvents[editingDay]||[];
  var tl={work:'Arbeit',family:'Familie',sport:'Sport',free:'Frei'};
  document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal-sheet"><div class="modal-header"><h3>'+editingDay+' bearbeiten</h3><button class="modal-close" onclick="closeModal()">×</button></div><div id="mEv">'+ev.map(function(e,i){return'<div class="modal-event-row"><input type="text" value="'+eH(e.text)+'" onchange="updEv('+i+',\'text\',this.value)"><select onchange="updEv('+i+',\'type\',this.value)">'+['work','family','sport','free'].map(function(t){return'<option value="'+t+'" '+(e.type===t?'selected':'')+'>'+tl[t]+'</option>'}).join('')+'</select><button class="delete-btn" onclick="rmEv('+i+')">×</button></div>'}).join('')+'</div><div class="btn-row"><button class="btn-small" onclick="addEv()">+ Eintrag</button><button class="btn-outline" onclick="closeModal()">Fertig</button></div></div></div>';
}
function updEv(i,f,v){weekEvents[editingDay][i][f]=v;schS()}
function rmEv(i){weekEvents[editingDay].splice(i,1);schS();rModal()}
function addEv(){if(!weekEvents[editingDay])weekEvents[editingDay]=[];weekEvents[editingDay].push({text:'',type:'work'});schS();rModal()}

function switchTab(t){currentTab=t;render()}
function addCapture(){var i=document.getElementById('captureInput'),t=document.getElementById('captureTag');if(!i.value.trim())return;captures.unshift({text:i.value.trim(),tag:t.value,date:tS,time:new Date().toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'})});schS();render()}
function deleteCapture(i){captures.splice(i,1);schS();render()}
function addAppt(){var t=document.getElementById('tText'),d=document.getElementById('tDate');if(!t.value.trim())return;appointments.push({text:t.value.trim(),date:d.value});schS();render()}
function delAppt(i){appointments.splice(i,1);schS();render()}
function toggleHabit(k){habits[k]=!habits[k];schS();render()}
function toggleMorning(i){morningChecks[i]=!morningChecks[i];schS();render()}
function saveMemo(t){var el=document.getElementById(t==='partner'?'pMemo':'wMemo');memos[t]=el.value;schS();var b=el.nextElementSibling;b.textContent='\u2713 Gespeichert';setTimeout(function(){b.textContent='Speichern'},1500)}
function addPhoneTime(m){phoneMinutes.today+=m;phoneMinutes.date=tS;schS();render()}
function resetPhone(){phoneMinutes.today=0;schS();render()}
function saveSettings(){sC({binId:document.getElementById('binId').value.trim(),apiKey:document.getElementById('apiKey').value.trim()});var s=document.getElementById('sStatus');s.className='settings-status ok';s.textContent='\u2713 Gespeichert. Jetzt "Testen" klicken.'}
async function testSync(){var s=document.getElementById('sStatus');s.className='settings-status';s.style.background='var(--accent-light)';s.style.color='var(--accent)';s.textContent='Verbinde...';var d=await cL();if(ss==='ok'){s.className='settings-status ok';s.textContent='\u2713 Verbindung OK!';if(d&&d.captures&&d.captures.length>0){aD(d);s.textContent+=' '+d.captures.length+' Captures geladen.'}}else{s.className='settings-status err';s.textContent='\u2717 Fehlgeschlagen.'}currentTab='settings';render()}
async function forceUpload(){var s=document.getElementById('sStatus');s.className='settings-status';s.style.background='var(--accent-light)';s.style.color='var(--accent)';s.textContent='Lade hoch...';await cS();if(ss==='ok'){s.className='settings-status ok';s.textContent='\u2713 Hochgeladen!'}else{s.className='settings-status err';s.textContent='\u2717 Fehlgeschlagen.'}}

render();
(async function(){var c=gC();if(c.binId&&c.apiKey){var d=await cL();if(d&&d.captures){aD(d);render()}}})();
</script>
</body>
